name: Deploy to Azure Web Apps

on:
  push:
    branches:
      - main # Triggers flow after merging to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-blockchain:latest -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-blockchain:${{ github.sha }} ./blockchain
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:latest -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:${{ github.sha }} ./backend
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:latest -t ${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:${{ github.sha }} ./frontend

    - name: Push Docker images
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
        docker push --all-tags ${{ secrets.ACR_LOGIN_SERVER }}/voting-blockchain
        docker push --all-tags ${{ secrets.ACR_LOGIN_SERVER }}/voting-backend
        docker push --all-tags ${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend

    - name: Trigger Azure Web App Deployment
      run: |
        # Parse MSDeploy username and password from the publish profile
        PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        USER=$(echo "$PROFILE" | grep -oP 'publishMethod="MSDeploy".*?userName="\K[^"]+')
        PASS=$(echo "$PROFILE" | grep -oP 'publishMethod="MSDeploy".*?userPWD="\K[^"]+')
        
        # Trigger the Continuous Deployment Docker Hub webhook natively!
        echo "Triggering Web App to pull latest images..."
        curl -d "" -X POST -u "$USER:$PASS" https://campusvotingappsea7768.scm.azurewebsites.net/docker/hook 
